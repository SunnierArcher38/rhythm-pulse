<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1e0a3c"/>
      <stop offset="40%" stop-color="#0f0528"/>
      <stop offset="100%" stop-color="#04010e"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6ba6"/>
      <stop offset="30%" stop-color="#c44dff"/>
      <stop offset="60%" stop-color="#6db4ff"/>
      <stop offset="100%" stop-color="#50fa7b"/>
    </linearGradient>
    <linearGradient id="subtitleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6db4ff"/>
      <stop offset="50%" stop-color="#c44dff"/>
      <stop offset="100%" stop-color="#6db4ff"/>
    </linearGradient>
    <filter id="glowHeavy">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowLight">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadowGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- grid pattern -->
  <g stroke="#ffffff" stroke-width="0.3" opacity="0.04">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- floating musical notes -->
  <g fill="#c44dff" opacity="0.12">
    <text x="80" y="70" font-size="30" font-family="Arial">♪</text>
    <text x="250" y="140" font-size="22" font-family="Arial">♫</text>
    <text x="950" y="90" font-size="34" font-family="Arial">♪</text>
    <text x="1080" y="200" font-size="24" font-family="Arial">♬</text>
    <text x="120" y="330" font-size="20" font-family="Arial">♩</text>
    <text x="1050" y="340" font-size="28" font-family="Arial">♫</text>
    <text x="450" y="60" font-size="18" font-family="Arial">♬</text>
    <text x="750" y="350" font-size="16" font-family="Arial">♪</text>
  </g>

  <!-- lane lines -->
  <g transform="translate(600, 330)">
    <line x1="-120" y1="0" x2="-120" y2="-180" stroke="#c44dff" stroke-width="2" opacity="0.25"/>
    <line x1="-60" y1="0" x2="-60" y2="-180" stroke="#c44dff" stroke-width="2" opacity="0.25"/>
    <line x1="0" y1="0" x2="0" y2="-180" stroke="#c44dff" stroke-width="2" opacity="0.25"/>
    <line x1="60" y1="0" x2="60" y2="-180" stroke="#c44dff" stroke-width="2" opacity="0.25"/>
    <line x1="120" y1="0" x2="120" y2="-180" stroke="#c44dff" stroke-width="2" opacity="0.25"/>
  </g>

  <!-- falling notes -->
  <g>
    <rect x="470" y="-60" width="8" height="22" rx="4" fill="#ff6ba6" opacity="0.7" filter="url(#glowLight)">
      <animate attributeName="y" from="-60" to="-20" dur="0.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.8" to="0" dur="0.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="530" y="-80" width="8" height="22" rx="4" fill="#c44dff" opacity="0.7" filter="url(#glowLight)">
      <animate attributeName="y" from="-80" to="-20" dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.8" to="0" dur="0.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="590" y="-40" width="8" height="22" rx="4" fill="#50fa7b" opacity="0.7" filter="url(#glowLight)">
      <animate attributeName="y" from="-40" to="-20" dur="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.8" to="0" dur="0.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="650" y="-90" width="8" height="22" rx="4" fill="#6db4ff" opacity="0.7" filter="url(#glowLight)">
      <animate attributeName="y" from="-90" to="-20" dur="1.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.8" to="0" dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="710" y="-50" width="8" height="22" rx="4" fill="#ff6ba6" opacity="0.7" filter="url(#glowLight)">
      <animate attributeName="y" from="-50" to="-20" dur="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.8" to="0" dur="0.6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- hold note -->
  <g>
    <rect x="588" y="-170" width="12" height="150" rx="6" fill="#50fa7b" opacity="0.2" filter="url(#shadowGlow)">
      <animate attributeName="y" from="-170" to="-20" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.35" to="0" dur="1.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- hit glow flash (receptor area) -->
  <g opacity="0.3">
    <rect x="476" y="-22" width="50" height="8" rx="4" fill="#ff6ba6">
      <animate attributeName="opacity" values="0.3;0.6;0" dur="1s" repeatCount="indefinite"/>
    </rect>
    <rect x="536" y="-22" width="50" height="8" rx="4" fill="#c44dff">
      <animate attributeName="opacity" values="0.3;0.6;0" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="596" y="-22" width="50" height="8" rx="4" fill="#50fa7b">
      <animate attributeName="opacity" values="0;0.6;0.3" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="656" y="-22" width="50" height="8" rx="4" fill="#6db4ff">
      <animate attributeName="opacity" values="0.3;0;0.6" dur="1.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="716" y="-22" width="50" height="8" rx="4" fill="#ff6ba6">
      <animate attributeName="opacity" values="0;0.3;0.6" dur="0.9s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- title -->
  <text x="600" y="200" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="78" font-weight="900" fill="url(#titleGrad)" filter="url(#glowHeavy)" letter-spacing="3">RHYTHM PULSE</text>

  <!-- subtitle -->
  <text x="600" y="258" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="url(#subtitleGrad)" letter-spacing="8" filter="url(#glowLight)">DROP YOUR MUSIC. PLAY INSTANTLY.</text>
</svg>