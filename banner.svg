<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="50%" stop-color="#0d0520"/>
      <stop offset="100%" stop-color="#050210"/>
    </radialGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="50%" stop-color="#c44dff"/>
      <stop offset="100%" stop-color="#6b9dff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <!-- floating notes -->
  <g opacity="0.15" fill="#c44dff">
    <text x="150" y="80" font-size="28" font-family="Arial">♪</text>
    <text x="300" y="120" font-size="20" font-family="Arial">♫</text>
    <text x="900" y="100" font-size="32" font-family="Arial">♪</text>
    <text x="1050" y="180" font-size="22" font-family="Arial">♬</text>
    <text x="100" y="320" font-size="18" font-family="Arial">♩</text>
    <text x="1100" y="300" font-size="26" font-family="Arial">♫</text>
  </g>
  <!-- title -->
  <text x="600" y="200" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="900" fill="url(#title)" filter="url(#glow)">RHYTHM PULSE</text>
  <!-- subtitle -->
  <text x="600" y="260" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#6b9dff" letter-spacing="6">A RHYTHM GAME INSPIRED BY FNF &amp; OSU!MANIA</text>
  <!-- lanes visual -->
  <g transform="translate(600,310)" stroke="#c44dff" stroke-width="2" opacity="0.3">
    <line x1="-80" y1="0" x2="-80" y2="-100"/>
    <line x1="-30" y1="0" x2="-30" y2="-100"/>
    <line x1="20" y1="0" x2="20" y2="-100"/>
    <line x1="70" y1="0" x2="70" y2="-100"/>
  </g>
  <!-- notes falling -->
  <g fill="#c44dff" opacity="0.5">
    <rect x="-82" y="-50" width="4" height="16" rx="2">
      <animate attributeName="y" from="-50" to="-10" dur="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="1" to="0" dur="0.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="-32" y="-70" width="4" height="16" rx="2">
      <animate attributeName="y" from="-70" to="-10" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="1" to="0" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="18" y="-30" width="4" height="16" rx="2">
      <animate attributeName="y" from="-30" to="-10" dur="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="1" to="0" dur="0.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="68" y="-60" width="4" height="16" rx="2">
      <animate attributeName="y" from="-60" to="-10" dur="0.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="1" to="0" dur="0.7s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
